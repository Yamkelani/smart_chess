name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Rust Engine ─────────────────────────────────────────────
  engine-test:
    name: Engine – Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: engine-${{ runner.os }}-cargo-${{ hashFiles('engine/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --release -- --test-threads=4

      - name: Clippy lint
        run: cargo clippy --release -- -D warnings

      - name: Check formatting
        run: cargo fmt -- --check

  # ── Python AI Service ───────────────────────────────────────
  ai-service-test:
    name: AI Service – Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check app/

      - name: Type check with mypy
        run: |
          pip install mypy
          mypy app/ --ignore-missing-imports || true

  # ── Frontend ────────────────────────────────────────────────
  frontend-build:
    name: Frontend – Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

  # ── Docker Compose ──────────────────────────────────────────
  docker-build:
    name: Docker – Build All Images
    runs-on: ubuntu-latest
    needs: [engine-test, ai-service-test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build all images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for healthchecks
        run: |
          for i in $(seq 1 30); do
            if docker compose ps | grep -q "unhealthy\|starting"; then
              sleep 5
            else
              break
            fi
          done
          docker compose ps
          # Fail if any container is unhealthy
          ! docker compose ps | grep -q "unhealthy"

      - name: Tear down
        if: always()
        run: docker compose down -v
