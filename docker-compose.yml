services:
  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: chess3d-engine
    restart: unless-stopped
    mem_limit: 512m
    cpus: 2.0
    ports:
      - "8081:8081"
    environment:
      - ENGINE_PORT=8081
      - RUST_LOG=info
    volumes:
      - engine-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: chess3d-ai
    restart: unless-stopped
    mem_limit: 1g
    cpus: 2.0
    ports:
      - "8082:8082"
    environment:
      - ENGINE_URL=http://engine:8081
      - AI_SERVICE_PORT=8082
      - MODEL_DIR=/app/models
      - TRAINING_DATA_DIR=/app/training_data
    volumes:
      - ai-models:/app/models
      - ai-training:/app/training_data
    depends_on:
      engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chess3d-frontend
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.5
    ports:
      - "5173:80"
    depends_on:
      engine:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  engine-data:
  ai-models:
  ai-training:
